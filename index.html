<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Pengumuman SPMB SMKN 1 Bunga Mayang
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f5f5;
overflow-x:hidden;
}

.container{
width:100%;
min-height:100vh;
padding:20px;
background:
linear-gradient(to bottom,#ffffff,#f5f5f5);
}

.main{
max-width:1200px;
margin:auto;
}

/* LOGO */

.logo{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.logo img{
height:60px;
}

/* TITLE */

.title{
text-align:center;
margin-top:15px;
}

.title h2{
font-size:22px;
font-weight:700;
}

.title h1{
font-size:55px;
font-weight:800;
color:#e00000;
line-height:1.1;
}

.title h3{
font-size:22px;
margin-top:5px;
}

/* CONTENT */

.content{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
margin-top:30px;
flex-wrap:wrap;
}

/* IMAGE */

.left{
width:100%;
max-width:400px;
}

.left img{
width:100%;
}

/* CARD */

.card{
width:100%;
max-width:500px;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.badge{
background:#e00000;
color:white;
padding:12px 25px;
border-radius:12px;
width:max-content;
margin:auto;
font-size:22px;
font-weight:700;
}

.card-title{
text-align:center;
margin-top:20px;
}

.card-title h2{
font-size:28px;
}

.card-title p{
font-size:18px;
}

/* COUNTDOWN */

.countdown-box{
margin-top:25px;
background:#fff7f7;
padding:20px;
border-radius:20px;
border:1px solid #ffd8d8;
}

.countdown-box h3{
text-align:center;
color:#e00000;
margin-bottom:20px;
}

.countdown{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.time{
background:white;
padding:15px;
border-radius:14px;
text-align:center;
}

.time h1{
font-size:40px;
color:#e00000;
}

.time span{
font-size:13px;
font-weight:600;
}

/* RESULT */

.result-area{
display:none;
margin-top:20px;
}

.result-area.active{
display:block;
}

.input{
margin-top:15px;
}

.input input{
width:100%;
height:55px;
padding:15px;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
}

.btn{
width:100%;
height:55px;
margin-top:15px;
border:none;
background:#e00000;
color:white;
font-size:18px;
font-weight:700;
border-radius:12px;
cursor:pointer;
}

.result{
margin-top:20px;
padding:20px;
border-radius:15px;
text-align:center;
display:none;
}

.lulus{
background:#eaffea;
border:2px solid green;
color:green;
}

.tidak{
background:#fff0f0;
border:2px solid red;
color:red;
}

/* FOOTER */

footer{
margin-top:40px;
background:#d60000;
color:white;
padding:15px;
text-align:center;
}

/* MOBILE */

@media(max-width:768px){

.title h1{
font-size:30px;
}

.title h2{
font-size:16px;
}

.title h3{
font-size:15px;
}

.logo img{
height:40px;
}

.left{
max-width:220px;
}

.card{
padding:18px;
}

.badge{
font-size:14px;
}

.card-title h2{
font-size:20px;
}

.countdown{
grid-template-columns:repeat(2,1fr);
}

.time h1{
font-size:28px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="main">

<!-- LOGO -->
<div class="logo">

<img src="https://raw.githubusercontent.com/smknbungamayang-keren/pengumuman-spmb/main/logo1.png">

<img src="https://raw.githubusercontent.com/smknbungamayang-keren/pengumuman-spmb/main/logo2.png">

<img src="https://raw.githubusercontent.com/smknbungamayang-keren/pengumuman-spmb/main/logo3.png">

</div>

<!-- TITLE -->
<div class="title">

<h2>SISTEM PENERIMAAN MURID BARU</h2>

<h1>SMK NEGERI 1 BUNGA MAYANG</h1>

<h3>TAHUN PELAJARAN 2026 - 2027</h3>

</div>

<!-- CONTENT -->
<div class="content">

<div class="left">

<img src="https://raw.githubusercontent.com/USERNAME/REPO/main/siswa.png">

</div>

<div class="card">

<div class="badge">
PENGUMUMAN KELULUSAN
</div>

<div class="card-title">

<h2>SPMB SMKN 1 Bunga Mayang</h2>

<p>TAHUN PELAJARAN 2026 - 2027</p>

</div>

<!-- COUNTDOWN -->
<div id="countdownSection">

<div class="countdown-box">

<h3>
PENGUMUMAN AKAN DIBUKA DALAM :
</h3>

<div class="countdown">

<div class="time">
<h1 id="days">00</h1>
<span>HARI</span>
</div>

<div class="time">
<h1 id="hours">00</h1>
<span>JAM</span>
</div>

<div class="time">
<h1 id="minutes">00</h1>
<span>MENIT</span>
</div>

<div class="time">
<h1 id="seconds">00</h1>
<span>DETIK</span>
</div>

</div>

</div>

</div>

<!-- RESULT -->
<div class="result-area"
id="resultArea">

<div class="input">

<input type="text"
id="nisn"
placeholder="Masukkan NISN">

</div>

<button class="btn"
onclick="cekKelulusan()">

CEK HASIL KELULUSAN

</button>

<div id="hasil"
class="result"></div>

</div>

</div>

</div>

<footer>
© 2026 SMKN 1 Bunga Mayang
</footer>

</div>

<script>

const spreadsheetID =
"1_5kYMUilnKPlLP7Y4y3Vo4zse2wgdNMYwSKEd4TdJRs";

/* SHEET URLs */

const siswaURL =
`https://opensheet.elk.sh/${spreadsheetID}/siswa`;

const settingURL =
`https://opensheet.elk.sh/${spreadsheetID}/setting`;

let siswaData = [];

/* LOAD DATA */

async function loadData(){

try{

/* SISWA */

const siswaRes =
await fetch(siswaURL);

siswaData =
await siswaRes.json();

/* SETTING */

const settingRes =
await fetch(settingURL);

const settingData =
await settingRes.json();

const tanggal =
settingData[0]
.tanggal_pengumuman;

startCountdown(tanggal);

}catch(err){

console.log(err);

alert("Gagal mengambil data");

}

}

/* COUNTDOWN */

function startCountdown(date){

const targetDate =
new Date(date).getTime();

function updateCountdown(){

const now =
new Date().getTime();

const distance =
targetDate - now;

if(distance <= 0){

document.getElementById(
"countdownSection")
.style.display="none";

document.getElementById(
"resultArea")
.classList.add("active");

return;

}

const days =
Math.floor(distance /
(1000*60*60*24));

const hours =
Math.floor((distance %
(1000*60*60*24)) /
(1000*60*60));

const minutes =
Math.floor((distance %
(1000*60*60)) /
(1000*60));

const seconds =
Math.floor((distance %
(1000*60)) / 1000);

document.getElementById("days")
.innerHTML = days;

document.getElementById("hours")
.innerHTML = hours;

document.getElementById("minutes")
.innerHTML = minutes;

document.getElementById("seconds")
.innerHTML = seconds;

}

setInterval(updateCountdown,1000);

updateCountdown();

}

/* CEK KELULUSAN */

function cekKelulusan(){

const nisn =
document.getElementById("nisn").value;

const resultBox =
document.getElementById("hasil");

const siswa =
siswaData.find(item =>
item.nisn == nisn);

resultBox.style.display="block";

if(siswa){

if(siswa.status
.toUpperCase() === "LULUS"){

resultBox.className =
"result lulus";

resultBox.innerHTML = `
<h2>SELAMAT ANDA LULUS</h2>
<br>
<p><b>Nama :</b> ${siswa.nama}</p>
<p><b>NISN :</b> ${siswa.nisn}</p>
<p><b>Jurusan :</b> ${siswa.jurusan}</p>
`;

}else{

resultBox.className =
"result tidak";

resultBox.innerHTML = `
<h2>MOHON MAAF</h2>
<p>Anda belum dinyatakan lulus</p>
`;

}

}else{

resultBox.className =
"result tidak";

resultBox.innerHTML = `
<h2>DATA TIDAK DITEMUKAN</h2>
`;

}

}

/* LOAD */

loadData();

</script>

</body>
</html>
