<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Pengumuman SPMB SMKN 1 Bunga Mayang</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f5f5;
overflow-x:hidden;
}

.container{
width:100%;
min-height:100vh;
background:linear-gradient(to bottom,#ffffff,#f5f5f5);
padding:20px;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:100%;
max-width:550px;
background:white;
padding:30px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
animation:fadeUp 1s ease;
}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{
text-align:center;
}

.logo img{
width:90px;
margin-bottom:15px;
}

.title{
text-align:center;
}

.title h1{
font-size:34px;
color:#d90000;
font-weight:800;
line-height:1.2;
}

.title p{
margin-top:5px;
font-size:16px;
font-weight:600;
}

.countdown-box{
margin-top:25px;
background:#fff7f7;
padding:20px;
border-radius:20px;
border:1px solid #ffd5d5;
}

.countdown-box h3{
text-align:center;
margin-bottom:20px;
color:#d90000;
}

.countdown{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.time{
background:white;
padding:15px 5px;
border-radius:15px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.time h1{
font-size:35px;
color:#d90000;
font-weight:800;
}

.time span{
font-size:13px;
font-weight:600;
color:#666;
}

.search-area{
display:none;
margin-top:25px;
}

.search-area.active{
display:block;
}

.search-area p{
text-align:center;
font-size:14px;
margin-bottom:15px;
}

.input{
width:100%;
height:55px;
border:1px solid #ccc;
border-radius:12px;
padding:0 15px;
font-size:16px;
margin-bottom:15px;
outline:none;
}

.btn{
width:100%;
height:55px;
border:none;
background:#d90000;
color:white;
font-size:17px;
font-weight:700;
border-radius:12px;
cursor:pointer;
}

.result{
margin-top:20px;
padding:20px;
border-radius:15px;
display:none;
text-align:center;
}

.lulus{
background:#ecffef;
border:2px solid #2ab54a;
color:#14752a;
}

.tidak{
background:#fff0f0;
border:2px solid #ff4040;
color:#d00000;
}

.loading{
background:#f5f5f5;
border:1px solid #ddd;
color:#555;
}

footer{
margin-top:25px;
text-align:center;
font-size:13px;
color:#666;
}

@media(max-width:768px){

.card{
padding:20px;
}

.title h1{
font-size:25px;
}

.countdown{
grid-template-columns:repeat(2,1fr);
}

.time h1{
font-size:28px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="logo">

<!-- GANTI LOGO -->
<img src="logo.png">

</div>

<div class="title">

<h1>PENGUMUMAN SPMB</h1>

<p>
SMK NEGERI 1 BUNGA MAYANG
</p>

<p>
TAHUN PELAJARAN 2026/2027
</p>

</div>

<!-- COUNTDOWN -->
<div id="countdownSection"
class="countdown-box">

<h3>
PENGUMUMAN AKAN DIBUKA DALAM
</h3>

<div class="countdown">

<div class="time">
<h1 id="days">00</h1>
<span>HARI</span>
</div>

<div class="time">
<h1 id="hours">00</h1>
<span>JAM</span>
</div>

<div class="time">
<h1 id="minutes">00</h1>
<span>MENIT</span>
</div>

<div class="time">
<h1 id="seconds">00</h1>
<span>DETIK</span>
</div>

</div>

</div>

<!-- SEARCH -->
<div class="search-area"
id="searchArea">

<p>
Masukkan NISN atau Nama
</p>

<input type="text"
id="keyword"
class="input"
placeholder="Masukkan NISN atau Nama">

<button class="btn"
onclick="cekKelulusan()">

CEK HASIL

</button>

<div id="hasil"
class="result"></div>

</div>

<footer>
© 2026 SMKN 1 Bunga Mayang
</footer>

</div>

</div>

<script>

// =====================
// GANTI DENGAN URL APPS SCRIPT
// =====================

const API_URL =
"https://script.google.com/macros/s/AKfycbxxxxxx/exec";

let semuaData = [];

let tanggalPengumuman = "";

// =====================
// LOAD DATA
// =====================

async function loadData(){

try{

const res =
await fetch(API_URL);

const json =
await res.json();

semuaData = json.data;

tanggalPengumuman =
json.tanggal_pengumuman;

startCountdown();

}catch(err){

alert("Gagal mengambil data");

console.log(err);

}

}

loadData();

// =====================
// COUNTDOWN
// =====================

function startCountdown(){

setInterval(()=>{

const now =
new Date().getTime();

const target =
new Date(tanggalPengumuman)
.getTime();

const distance =
target - now;

if(distance <= 0){

document
.getElementById(
"countdownSection")
.style.display = "none";

document
.getElementById(
"searchArea")
.classList.add("active");

return;

}

const days =
Math.floor(distance /
(1000*60*60*24));

const hours =
Math.floor((distance %
(1000*60*60*24))
/ (1000*60*60));

const minutes =
Math.floor((distance %
(1000*60*60))
/ (1000*60));

const seconds =
Math.floor((distance %
(1000*60))
/ 1000);

document
.getElementById("days")
.innerHTML = days;

document
.getElementById("hours")
.innerHTML = hours;

document
.getElementById("minutes")
.innerHTML = minutes;

document
.getElementById("seconds")
.innerHTML = seconds;

},1000);

}

// =====================
// CEK KELULUSAN
// =====================

function cekKelulusan(){

const key =
document
.getElementById("keyword")
.value
.toLowerCase()
.trim();

const hasil =
document
.getElementById("hasil");

if(key == ""){

alert("Masukkan NISN atau Nama");

return;

}

hasil.style.display="block";

hasil.className =
"result loading";

hasil.innerHTML =
"Sedang memproses...";

setTimeout(()=>{

const siswa =
semuaData.find(item =>

String(item.NISN)
.toLowerCase()
.includes(key)

||

String(item.NAMA)
.toLowerCase()
.includes(key)

);

if(siswa){

if(String(siswa.STATUS)
.toUpperCase()
== "LULUS"){

hasil.className =
"result lulus";

hasil.innerHTML = `

<h2>
🎉 SELAMAT 🎉
</h2>

<br>

<h3>
ANDA DINYATAKAN LULUS
</h3>

<br>

<p>
<b>Nama :</b>
${siswa.NAMA}
</p>

<p>
<b>NISN :</b>
${siswa.NISN}
</p>

<p>
<b>Jurusan :</b>
${siswa.JURUSAN}
</p>

`;

}else{

hasil.className =
"result tidak";

hasil.innerHTML = `

<h2>
MOHON MAAF
</h2>

<br>

<p>
ANDA BELUM DINYATAKAN LULUS
</p>

`;

}

}else{

hasil.className =
"result tidak";

hasil.innerHTML = `

<h2>
DATA TIDAK DITEMUKAN
</h2>

`;

}

},800);

}

// ENTER
document
.getElementById("keyword")
.addEventListener(
"keypress",
function(e){

if(e.key === "Enter"){

cekKelulusan();

}

});

</script>

</body>
</html>
